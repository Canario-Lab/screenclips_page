<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ScreenClips - strona w budowie</title>
    <meta
      name="description"
      content="Strona landing page aplikacji ScreenClips jest w budowie."
    >
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f7f8fb;
        --text: #101828;
        --muted: #667085;
        --accent: #2563eb;
        --panel: #ffffff;
        --border: #e4e7ec;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0b1220;
          --text: #f8fafc;
          --muted: #a7b0c0;
          --accent: #60a5fa;
          --panel: #111827;
          --border: #243044;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px 20px;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 720px);
        padding: 48px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--panel);
        text-align: center;
      }

      .eyebrow {
        margin: 0 0 16px;
        color: var(--accent);
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(36px, 8vw, 68px);
        line-height: 1;
      }

      p {
        margin: 24px auto 0;
        max-width: 560px;
        color: var(--muted);
        font-size: 20px;
        line-height: 1.6;
      }

      @media (max-width: 560px) {
        main {
          padding: 36px 24px;
        }

        p {
          font-size: 18px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">ScreenClips</p>
      <h1>Strona w budowie</h1>
      <p>
        Podpinamy domenę i DNS-y w OVH. Landing page aplikacji ScreenClips
        pojawi się tutaj już wkrótce.
      </p>
    </main>
  </body>
</html>
